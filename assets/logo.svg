<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nuxt Server Log logo">
  <defs>
    <linearGradient id="nsl-bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1F1A"/>
      <stop offset="1" stop-color="#020420"/>
    </linearGradient>
    <linearGradient id="nsl-accent" x1="56" y1="44" x2="200" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00DC82"/>
      <stop offset="1" stop-color="#36E4DA"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#nsl-bg)"/>
  <rect x="1" y="1" width="254" height="254" rx="55" fill="none" stroke="#00DC82" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Nuxt mountain mark -->
  <path d="M150 64 L192 116 L108 116 Z" fill="#36E4DA"/>
  <path d="M108 44 L156 116 L60 116 Z" fill="url(#nsl-accent)"/>

  <!-- Server rack (the "server") -->
  <rect x="52" y="132" width="152" height="92" rx="18" fill="#00DC82" fill-opacity="0.06" stroke="url(#nsl-accent)" stroke-width="3"/>

  <!-- Log entries inside the rack (the "log") -->
  <circle cx="76" cy="158" r="6" fill="#00DC82"/>
  <rect x="92" y="152" width="84" height="12" rx="6" fill="#00DC82"/>

  <circle cx="76" cy="184" r="6" fill="#36E4DA"/>
  <rect x="92" y="178" width="58" height="12" rx="6" fill="#36E4DA"/>

  <!-- Server status LEDs -->
  <circle cx="72" cy="206" r="4" fill="#00DC82"/>
  <circle cx="88" cy="206" r="4" fill="#36E4DA"/>
  <circle cx="104" cy="206" r="4" fill="#FFB020"/>
  <rect x="128" y="202" width="48" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.18"/>
</svg>
